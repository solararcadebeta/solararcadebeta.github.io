<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
    <link rel="stylesheet" href="config/main.css" />
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/599/599505.png">
    <script src="config/main.js" type="module"></script>

<style>
/* ===== SPACE BACKGROUND ===== */

.space-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  background: radial-gradient(ellipse at bottom, #0d1d31 0%, #0c0d13 100%);
  overflow: hidden;
}

/* Small stars */
.stars {
  width: 1px;
  height: 1px;
  background: transparent;
  box-shadow: 500px 200px #fff,
              1200px 800px #fff,
              300px 600px #fff,
              900px 400px #fff,
              1500px 300px #fff;
  animation: animStar 50s linear infinite;
}

/* Medium stars */
.stars2 {
  width: 2px;
  height: 2px;
  background: transparent;
  box-shadow: 700px 100px #fff,
              1300px 500px #fff,
              400px 900px #fff,
              1100px 200px #fff,
              1600px 700px #fff;
  animation: animStar 100s linear infinite;
}

/* Big stars */
.stars3 {
  width: 3px;
  height: 3px;
  background: transparent;
  box-shadow: 600px 300px #fff,
              1400px 600px #fff,
              200px 700px #fff,
              1000px 900px #fff,
              1700px 400px #fff;
  animation: animStar 150s linear infinite;
}

@keyframes animStar {
  from {
    transform: translateY(0px);
  }
  to {
    transform: translateY(-2000px);
  }
}

/* Make sure content is above background */
.center, #gamesContainer, .footer {
  position: relative;
  z-index: 1;
}
</style>
    
  </head>
  <body>
    <div class="space-bg">
      <div class="stars"></div>
      <div class="stars2"></div>
      <div class="stars3"></div>
    </div>
    
    <div class="center">
      <img src="https://i.postimg.cc/02cHQHGV/output-onlinepngtools-(3).png" style="margin-left: auto; margin-right: auto; margin-top: 25px" width="10%"></img>
      <p id="subtitle"></p>
    </div>
    <div class="center">
      <input type="text" id="searchInput" placeholder="Search the solar system" />
    </div>
    <div id="gamesContainer"></div>
    <div class="footer">
      <a style="font-weight: 700">please do not use this for intended misbehaviour, and only use this website with permission. i am against using this in lessons. learning comes first.
      </a>
      <hr style="width: 15vw;">
      <a style="font-weight: 700">credits go to:</a>
      <div style="width: 100vw; text-align: center;">
        <img style="width: 75px;" src="https://avatars.githubusercontent.com/u/115168315?v=4">
        <img style="width: 75px;" src="https://github.com/thedogecraft/lunaar.org/raw/main/public/media/logo.svg">
        <img style="width: 75px;" src="https://i.postimg.cc/TwKGTg2q/18bb02f42c1450ff257fe1f4228a57ae.webp">
      </div>
    </div>
    
  
  </body>
</html>
