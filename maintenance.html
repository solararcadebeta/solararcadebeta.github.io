<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>solar - maintenance</title>

<!-- Ubuntu Font -->
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Ubuntu', sans-serif;
}

body {
  min-height: 100vh;
  background: radial-gradient(circle at 20% 30%, #1a1f3a, #0c0f1d 70%);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px 20px;
}

.container {
  max-width: 1100px;
  width: 100%;
  text-align: center;
  backdrop-filter: blur(25px);
  background: rgba(255, 255, 255, 0.05);
  border-radius: 25px;
  padding: 50px 40px;
  box-shadow: 0 0 40px rgba(0, 150, 255, 0.15);
  border: 1px solid rgba(255,255,255,0.08);
}

h1 {
  font-size: 3rem;
  margin-bottom: 20px;
  background: linear-gradient(90deg, #4cc9f0, #7209b7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  font-size: 1.2rem;
  opacity: 0.8;
  margin-bottom: 40px;
}

.games {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 25px;
  margin-top: 30px;
}

.game-card {
  position: relative;
  background: rgba(255,255,255,0.06);
  border-radius: 20px;
  overflow: hidden;
  text-decoration: none;
  color: white;
  transition: 0.3s ease;
  border: 1px solid rgba(255,255,255,0.08);
}

.game-card:hover {
  transform: translateY(-8px);
  box-shadow: 0 0 25px rgba(76, 201, 240, 0.4);
}

.game-card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.game-card h3 {
  padding: 15px;
  font-weight: 500;
}

.badge {
  position: absolute;
  top: 10px;
  right: 10px;
  background: #4cc9f0;
  color: black;
  padding: 5px 10px;
  font-size: 0.75rem;
  border-radius: 12px;
  font-weight: 700;
}

footer {
  margin-top: 50px;
  font-size: 0.9rem;
  opacity: 0.5;
}
</style>
</head>

<body>
<div class="container">

  <h1>something big is coming for solar</h1>
  <div class="subtitle">
    we should be back by the 26th of Febuary, 2026 at 1pm. for now, enjoy our top games while you wait:
  </div>

  <div class="games">

    <a class="game-card" href="https://solararcade.github.io/cdn/baldisbasics" target="_blank">
      <img src="https://ogs.creatyc.com/cdn/baldis-basics/splash.png">
      <h3>Baldi's Basics</h3>
    </a>

    <a class="game-card" href="https://highschoolmathteachers.com/stuff/selfhosted/balatro/" target="_blank">
      <img src="https://highschoolmathteachers.com/stuff/games/balatro.jpg">
      <h3>Balatro</h3>
    </a>

    <a class="game-card" href="https://ogs.creatyc.com/cdn/bitlife/" target="_blank">
      <img src="https://ogs.creatyc.com/cdn/bitlife/splash.png">
      <h3>BitLife</h3>
    </a>

    <a class="game-card" href="https://solararcade.github.io/cdn/bloxfruitsredirect" target="_blank">
      <div class="badge">NEW</div>
      <img src="https://lh3.googleusercontent.com/d/18OhYxRfP1C-ufhvjtybdEtXm8aehBtjy=s220?authuser=0">
      <h3>Blox Fruits</h3>
    </a>

    <a class="game-card" href="https://ogs.creatyc.com/cdn/soundboard/" target="_blank">
      <img src="https://ogs.creatyc.com/cdn/soundboard/img/mlg-favicon.png">
      <h3>Soundboard</h3>
    </a>

  </div>

  <footer>
    sorry for any inconveniences.
  </footer>

</div>
</body>
</html>
